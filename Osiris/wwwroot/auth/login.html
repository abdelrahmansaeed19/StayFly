<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Back - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card fade-in-up">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Sign in to access your bookings</p>
            </div>

            <form onsubmit="handleLogin(event)">
                <label class="input-label">Email Address</label>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" class="input-field" placeholder="you@example.com" required>
                </div>

                <label class="input-label">Password</label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 24px;">
                    Sign In
                </button>

                <div id="message" style="text-align: center; margin-top: 16px; color: var(--error);"></div>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Sign Up</a>
                <br><br>
                <a href="../index.html" style="color: var(--text-muted);">
                    <i class="fas fa-arrow-left"></i> Back to Home
                </a>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgDiv = document.getElementById('message');
            const btn = e.target.querySelector('button[type="submit"]');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Signing in...';
            msgDiv.textContent = '';

            const res = await API.post('/Users/login', { email, password });

            if (res.success && res.data) {
                Auth.setToken(res.data.token);
                localStorage.setItem('userValues', JSON.stringify(res.data));

                msgDiv.style.color = 'var(--success)';
                msgDiv.innerHTML = '<i class="fas fa-check-circle"></i> Success! Redirecting...';

                setTimeout(() => {
                    window.location.href = '../index.html';
                }, 1000);
            } else {
                btn.disabled = false;
                btn.textContent = 'Sign In';
                msgDiv.style.color = 'var(--error)';
                msgDiv.innerHTML = '<i class="fas fa-exclamation-circle"></i> ' + (res.message || 'Login failed');
            }
        }
    </script>
</body>

</html>
