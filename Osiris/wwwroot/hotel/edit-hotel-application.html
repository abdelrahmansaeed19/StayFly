<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Hotel Application - Partner Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .form-section { margin-bottom: 40px; padding: 25px; background: rgba(15, 23, 42, 0.4); border: 1px solid var(--glass-border); border-radius: 20px; }
        .form-section h3 { color: var(--gold); display: flex; align-items: center; gap: 12px; margin-bottom: 25px; font-weight: 700; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .room-row { padding: 20px; background: rgba(255, 255, 255, 0.04); border-radius: 15px; margin-bottom: 20px; position: relative; border: 1px solid rgba(255,255,255,0.06); }
        .remove-row { position: absolute; top: 15px; right: 15px; color: var(--error); cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .remove-row:hover { transform: scale(1.1); }
        
        .step-indicator { display: flex; justify-content: space-between; margin-bottom: 40px; position: relative; }
        .step-indicator::before { content: ''; position: absolute; top: 15px; left: 0; right: 0; height: 2px; background: var(--glass-border); z-index: 1; }
        .step-dot { width: 35px; height: 35px; border-radius: 50%; background: var(--bg-main); border: 2px solid var(--glass-border); display: flex; align-items: center; justify-content: center; font-weight: 800; z-index: 2; transition: 0.3s; }
        .step-dot.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 168, 83, 0.1); transform: scale(1.1); box-shadow: 0 0 15px rgba(212,168,83,0.3); }
        .step-dot.completed { background: var(--gold); color: var(--bg-main); border-color: var(--gold); }

        .form-step { display: none; animation: slideIn 0.4s ease; }
        .form-step.active { display: block; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .existing-file-info { background: rgba(62, 207, 160, 0.06); border: 1px solid rgba(62, 207, 160, 0.2); padding: 10px 15px; border-radius: 10px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        .flbl { display: block; font-size: 12px; font-weight: 700; color: var(--gold); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }

        .cancel-opt { background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border); color: var(--text-main); padding: 12px 16px; border-radius: 10px; font-size: 14px; cursor: pointer; transition: 0.2s; text-align: left; }
        .cancel-opt.on { border-color: var(--gold); background: rgba(212, 168, 83, 0.12); font-weight: 700; }
        
        .amenity-grid { display: flex; flex-direction: column; gap: 20px; }
        .amenity-group { background: rgba(255,255,255,0.02); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .group-title { font-size: 0.9rem; color: var(--gold); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(212,168,83,0.15); font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .amenity-grid-sub { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
        .amenity-item { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; padding: 6px 0; transition: 0.2s; }
        .amenity-item:hover { color: var(--gold); transform: translateX(3px); }
        .amenity-item input:checked + span { color: var(--gold); font-weight: 600; }
        
        .sticky-actions { position: sticky; bottom: 20px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 20px; border-radius: 20px; border: 1px solid var(--gold); margin-top: 40px; display: flex; justify-content: space-between; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <a href="apply-hotel.html" class="nav-icon"><i class="fas fa-arrow-left"></i></a>
            <div class="header-title">Update Your Application</div>
            <div></div>
        </header>

        <div class="container" style="max-width: 1000px; padding: 40px 20px;">
            <div class="glass-panel" style="padding: 40px;">
                <div class="step-indicator">
                    <div class="step-dot active" data-step="1">1</div>
                    <div class="step-dot" data-step="2">2</div>
                    <div class="step-dot" data-step="3">3</div>
                    <div class="step-dot" data-step="4">4</div>
                    <div class="step-dot" data-step="5">5</div>
                    <div class="step-dot" data-step="6">6</div>
                </div>

                <form id="editHotelForm" onsubmit="updateApplication(event)">
                    <!-- Step 1: Identity -->
                    <div id="step1" class="form-step active">
                        <div class="form-section">
                            <h3><i class="fas fa-id-card"></i> Property Identity</h3>
                            <div class="input-grid">
                                <div>
                                    <label class="flbl">Hotel Name</label>
                                    <input type="text" id="hotelName" class="input-field" required>
                                </div>
                                <div>
                                    <label class="flbl">Star Rating</label>
                                    <select id="starRating" class="input-field">
                                        <option value="3">3 Stars</option>
                                        <option value="4">4 Stars</option>
                                        <option value="5">5 Stars</option>
                                    </select>
                                </div>
                            </div>
                            <div class="input-grid" style="margin-top:20px;">
                                <div>
                                    <label class="flbl">Property Type</label>
                                    <select id="propertyType" class="input-field">
                                        <option value="Hotel">Hotel</option>
                                        <option value="Apartment">Apartment</option>
                                        <option value="Resort">Resort</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="flbl">Accommodation</label>
                                    <select id="accommodationType" class="input-field">
                                        <option value="Room">Hotel Room</option>
                                        <option value="Suite">Suite</option>
                                        <option value="Studio">Studio</option>
                                    </select>
                                </div>
                            </div>
                            <div style="margin-top:20px;">
                                <label class="flbl">Description</label>
                                <textarea id="description" class="input-field" rows="3"></textarea>
                            </div>
                        </div>

                        <div class="form-section">
                            <h3><i class="fas fa-map-marker-alt"></i> Location Details</h3>
                            <div class="input-grid">
                                <div><label class="flbl">Governorate</label><input type="text" id="governorate" class="input-field" required></div>
                                <div><label class="flbl">City/Area</label><input type="text" id="cityArea" class="input-field" required></div>
                            </div>
                            <div style="margin-top:20px;">
                                <label class="flbl">Detailed Address</label>
                                <input type="text" id="addressDetails" class="input-field" required>
                            </div>
                            <div style="margin-top:20px;">
                                <label class="flbl">Address Proof (Contract/PDF)</label>
                                <div id="existingAddressProof" class="existing-file-info" style="display:none;">
                                    <span><i class="far fa-file-pdf"></i> Current Contract Saved</span>
                                    <a href="#" target="_blank" id="proofDown" class="btn-secondary" style="width:auto; padding:5px 15px;">View Current</a>
                                </div>
                                <input type="file" id="addressProofFile" class="input-field" accept=".pdf">
                            </div>
                        </div>
                    </div>

                    <!-- Step 2: Contacts & Docs -->
                    <div id="step2" class="form-step">
                        <div class="form-section">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                                <h3><i class="fas fa-address-book"></i> Contacts</h3>
                                <button type="button" class="btn-secondary" style="width:auto;" onclick="addContactRow()">+ Add</button>
                            </div>
                            <div id="contactsContainer"></div>
                        </div>
                        <div class="form-section">
                            <h3><i class="fas fa-file-invoice"></i> Required Documents</h3>
                            <div id="documentsContainer"></div>
                        </div>
                    </div>

                    <!-- Step 3: Amenities & Fields -->
                    <div id="step3" class="form-step">
                        <div class="form-section">
                            <h3><i class="fas fa-concierge-bell"></i> Amenities</h3>
                            <div class="amenity-grid" id="amenityGrid"></div>
                        </div>
                        <div class="form-section">
                            <h3><i class="fas fa-list-ul"></i> Additional Data</h3>
                            <div id="dynamicFieldsContainer" class="input-grid"></div>
                        </div>
                    </div>

                    <!-- Step 4: Policies -->
                    <div id="step4" class="form-step">
                        <div class="form-section">
                            <h3><i class="fas fa-hand-holding-usd"></i> Taxes & Fees</h3>
                            <div class="input-grid" style="align-items:center;">
                                <div>
                                    <label class="flbl">Service Charge %</label>
                                    <input type="number" id="serviceChargePct" class="input-field">
                                </div>
                                <div class="amenity-grid">
                                    <label class="amenity-item"><input type="checkbox" id="includeServiceCharge"> <span>Srv Included</span></label>
                                    <label class="amenity-item"><input type="checkbox" id="includeVat"> <span>VAT Included</span></label>
                                    <label class="amenity-item"><input type="checkbox" id="includeCityTax"> <span>City Tax Inc</span></label>
                                </div>
                            </div>
                        </div>
                        <div class="form-section">
                            <h3><i class="fas fa-shield-alt"></i> Cancellation</h3>
                            <div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:15px;" id="cancelStrategyGroup">
                                <button type="button" class="cancel-opt" onclick="setStrategy(this,'FreeAll')">Always Free</button>
                                <button type="button" class="cancel-opt" onclick="setStrategy(this,'NonRefundable')">Non-Refundable</button>
                                <button type="button" class="cancel-opt" onclick="setStrategy(this,'WindowBased')">Time-Window</button>
                            </div>
                            <div id="cancelWindowSection" style="display:none; margin-top:20px; border-top:1px solid rgba(255,255,255,0.1); padding-top:20px;">
                                <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                                    <label class="flbl">Refund Windows</label>
                                    <button type="button" class="btn-secondary" style="width:auto; font-size:11px;" onclick="addCancelRule()">+ Add Rule</button>
                                </div>
                                <div id="cancelRulesContainer" style="display:flex; flex-direction:column; gap:10px;"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Step 5: Rooms -->
                    <div id="step5" class="form-step">
                        <div class="form-section">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                                <h3><i class="fas fa-door-open"></i> Rooms & Prices</h3>
                                <button type="button" class="btn-secondary" style="width:auto;" onclick="addRoomRow()">+ Add Room</button>
                            </div>
                            <div id="roomsContainer"></div>
                        </div>
                    </div>

                    <!-- Step 6: Photos -->
                    <div id="step6" class="form-step">
                        <div class="form-section">
                            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                                <h3><i class="fas fa-images"></i> Photos Gallery</h3>
                                <button type="button" class="btn-secondary" style="width:auto;" onclick="addImageRow()">+ Add Photo</button>
                            </div>
                            <div id="imagesContainer"></div>
                        </div>
                    </div>

                    <div class="sticky-actions">
                        <button type="button" id="prevBtn" class="btn-secondary" style="width:auto; display:none;" onclick="prev()">Back</button>
                        <div></div>
                        <button type="button" id="nextBtn" class="btn-primary" style="width:auto;" onclick="next()">Next Step</button>
                        <button type="submit" id="updateBtn" class="btn-primary" style="width:auto; display:none; background:var(--success); border-color:var(--success);">Update Application <i class="fas fa-cloud-upload-alt"></i></button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script>
        let currentStep = 1;
        let metadata = { documentTypes: [], amenities: [], fieldDefinitions: [] };
        let hotelData = null;
        let selectedStrategy = 'FreeAll';
        let baseUrl = API_BASE_URL.replace('/api','');

        async function init() {
            if(!Auth.isLoggedIn()) { location.href='login.html'; return; }
            await loadMetadata();
            await loadHotelData();
        }

        async function loadMetadata() {
            try {
                const [amenRes, docRes, fieldRes] = await Promise.all([
                    API.get('/Metadata/amenities'),
                    API.get('/Metadata/document-types'),
                    API.get('/Metadata/hotel-field-definitions')
                ]);
                metadata.amenities = amenRes.data || [];
                metadata.documentTypes = docRes.data || [];
                metadata.fieldDefinitions = fieldRes.data || [];
                
                // Group & Render Amenities
                const highlights = metadata.amenities.filter(a => a.isHighlighted);
                const groups = {};
                metadata.amenities.forEach(a => {
                    const cat = a.category || 'General';
                    if(!groups[cat]) groups[cat] = [];
                    groups[cat].push(a);
                });

                const categoryIcons = {
                    'Internet': 'fa-wifi',
                    'Parking': 'fa-parking',
                    'Food & Drink': 'fa-utensils',
                    'Wellness & Pools': 'fa-swimming-pool',
                    'Reception Services': 'fa-concierge-bell',
                    'Cleaning Services': 'fa-broom',
                    'Business Facilities': 'fa-briefcase',
                    'General': 'fa-hotel',
                    'Safety & Security': 'fa-shield-alt'
                };

                const sortedTypes = Object.keys(groups).sort((a,b) => a.localeCompare(b));
                
                let amenHtml = '';

                // 1. POPULAR HIGHLIGHTS
                if (highlights.length > 0) {
                    amenHtml += `
                    <div class="amenity-group" style="border:1px solid rgba(212,168,83,0.3); background:rgba(212,168,83,0.03); margin-bottom: 25px;">
                        <div class="group-title" style="color:var(--gold); border-bottom-color:var(--gold);">
                            <i class="fas fa-star"></i> POPULAR HIGHLIGHTS (الأكثر طلباً)
                        </div>
                        <div class="amenity-grid-sub">
                            ${highlights.map(a => `
                                <label class="amenity-item" style="color:var(--gold); font-weight:600;">
                                    <input type="checkbox" name="amenity" value="${a.id}"> <span>${a.name}</span>
                                </label>`).join('')}
                        </div>
                    </div>`;
                }

                // 2. CATEGORIZED SECTIONS
                sortedTypes.forEach(type => {
                    const icon = categoryIcons[type] || 'fa-list';
                    amenHtml += `
                    <div class="amenity-group">
                        <div class="group-title"><i class="fas ${icon}"></i> ${type}</div>
                        <div class="amenity-grid-sub">
                            ${groups[type].map(a => `
                                <label class="amenity-item">
                                    <input type="checkbox" name="amenity" value="${a.id}"> <span>${a.name}</span>
                                </label>`).join('')}
                        </div>
                    </div>`;
                });
                document.getElementById('amenityGrid').innerHTML = amenHtml;

                // Sync logic
                document.getElementById('amenityGrid').addEventListener('change', (e) => {
                    if(e.target.name === 'amenity') {
                        const id = e.target.value;
                        const checked = e.target.checked;
                        document.querySelectorAll(`input[name="amenity"][value="${id}"]`).forEach(cb => cb.checked = checked);
                    }
                });
                document.getElementById('dynamicFieldsContainer').innerHTML = metadata.fieldDefinitions.map(f => {
                    const isTextArea = f.fieldType === 'TextArea';
                    const inputHtml = isTextArea ? 
                        `<textarea class="input-field d-val" style="height:80px; resize:vertical;" placeholder="Provide ${f.displayName}" ${f.isRequired ? 'required' : ''}></textarea>` :
                        `<input type="${f.fieldType === 'Number' ? 'number' : 'text'}" class="input-field d-val" placeholder="Provide ${f.displayName}" ${f.isRequired ? 'required' : ''}>`;

                    return `
                        <div class="dyn-field-entry" data-def-id="${f.id}" style="${isTextArea ? 'grid-column: 1 / -1;' : ''}">
                            <label class="flbl">${f.displayName} ${f.isRequired ? '<span style="color:var(--error); margin-left:4px;">* (Required)</span>' : ''}</label>
                            ${inputHtml}
                        </div>`;
                }).join('');
            } catch(e) { console.error(e); }
        }

        async function loadHotelData() {
            const res = await API.get('/Hotels/my-application');
            if(!res.success) { alert("No application found."); location.href='apply-hotel.html'; return; }
            hotelData = res.data;
            populateForm();
        }

        function populateForm() {
            const h = hotelData;
            document.getElementById('hotelName').value = h.hotelName;
            document.getElementById('starRating').value = h.starRating;
            document.getElementById('propertyType').value = h.propertyType;
            document.getElementById('accommodationType').value = h.accommodationType;
            document.getElementById('description').value = h.description;
            document.getElementById('governorate').value = h.governorate;
            document.getElementById('cityArea').value = h.cityArea;
            document.getElementById('addressDetails').value = h.addressDetails;

            if(h.addressProofUrl) {
                document.getElementById('existingAddressProof').style.display = 'flex';
                document.getElementById('proofDown').href = h.addressProofUrl.startsWith('/') ? `${baseUrl}${h.addressProofUrl}` : h.addressProofUrl;
            }

            // Contacts
            if(h.contacts?.length) h.contacts.forEach(c => addContactRow(c.contactType, c.contactValue));
            else addContactRow();

            // Docs (Relaxed frontend validation)
            const dCont = document.getElementById('documentsContainer');
            metadata.documentTypes.forEach(dt => {
                const existing = (h.documents || []).find(d => d.documentTypeId === dt.id);
                const row = document.createElement('div');
                row.className = 'room-row doc-entry';
                row.dataset.typeId = dt.id;
                const dUrl = existing ? (existing.fileUrl.startsWith('/') ? `${baseUrl}${existing.fileUrl}` : existing.fileUrl) : null;
                row.innerHTML = `
                    <label class="flbl">${dt.name} ${dt.isRequired ? '(Optional via Frontend)' : ''}</label>
                    ${existing ? `
                        <div class="existing-file-info">
                            <span><i class="fas fa-check-circle"></i> File uploaded</span>
                            <a href="${dUrl}" download class="btn-secondary" style="width:auto; padding:4px 10px; font-size:11px;">View Current</a>
                            <input type="hidden" class="d-url" value="${existing.fileUrl}">
                        </div>` : '<input type="hidden" class="d-url" value="">'}
                    <input type="file" class="input-field d-file" accept=".pdf">
                    <p style="font-size:10px; opacity:0.5; margin-top:5px;">Select a new file to replace the current one.</p>
                `;
                dCont.appendChild(row);
            });

            // Amenities
            const amenChecks = document.querySelectorAll('input[name="amenity"]');
            amenChecks.forEach(c => {
                const lbl = c.parentElement.querySelector('span').innerText.trim();
                if(h.amenityNames?.includes(lbl)) c.checked = true;
            });

            // Dyn Fields (Addition Data)
            if(h.dynamicFields && h.dynamicFields.length) {
                h.dynamicFields.forEach(f => {
                    const el = document.querySelector(`.dyn-field-entry[data-def-id="${f.fieldDefinitionId}"] .d-val`);
                    if(el) el.value = f.value || '';
                });
            }

            // Policies
            if(h.policy) {
                document.getElementById('serviceChargePct').value = h.policy.serviceChargePct;
                document.getElementById('includeServiceCharge').checked = h.policy.includeServiceCharge;
                document.getElementById('includeVat').checked = h.policy.includeVat;
                document.getElementById('includeCityTax').checked = h.policy.includeCityTax;
                
                const stratBtn = Array.from(document.getElementById('cancelStrategyGroup').children).find(b => b.innerText.toLowerCase().includes(h.policy.cancellationStrategy.toLowerCase()));
                if(stratBtn) setStrategy(stratBtn, h.policy.cancellationStrategy);

                if(h.policy.cancellationRules?.length) {
                    h.policy.cancellationRules.forEach(r => addCancelRule(r.fromHoursBeforeCheckIn, r.toHoursBeforeCheckIn, r.penaltyPct));
                }
            }

            // Rooms
            if(h.rooms?.length) h.rooms.forEach(r => addRoomRow(r));
            else addRoomRow();

            // Photos
            if(h.images?.length) h.images.forEach(img => addImageRow(img));
            else addImageRow();
        }

        function addContactRow(type = 'Phone', val = '') {
            const row = document.createElement('div');
            row.className = 'room-row contact-entry';
            row.innerHTML = `<div class="input-grid">
                <select class="input-field c-type"><option value="Phone" ${type==='Phone'?'selected':''}>Phone</option><option value="Email" ${type==='Email'?'selected':''}>Email</option><option value="WhatsApp" ${type==='WhatsApp'?'selected':''}>WhatsApp</option></select>
                <input type="text" class="input-field c-val" value="${val}" placeholder="Value..." required>
            </div><i class="fas fa-times remove-row" onclick="this.parentElement.remove()"></i>`;
            document.getElementById('contactsContainer').appendChild(row);
        }

        function addRoomRow(data = {}) {
            const row = document.createElement('div');
            row.className = 'room-row room-entry';
            row.innerHTML = `
                <div class="input-grid">
                    <select class="input-field r-name">
                        <option value="StandardRoom" ${data.name==='StandardRoom'?'selected':''}>Standard Room</option>
                        <option value="DeluxeRoom" ${data.name==='DeluxeRoom'?'selected':''}>Deluxe Room</option>
                        <option value="Suite" ${data.name==='Suite'?'selected':''}>Suite</option>
                    </select>
                    <input type="number" class="input-field r-occ" value="${data.occupancy||2}" placeholder="Occupancy">
                </div>
                <div style="display:grid; grid-template-columns:repeat(5, 1fr); gap:10px; margin-top:15px;">
                    <div><label class="flbl">RO $</label><input type="number" class="input-field r-ro" value="${data.roPrice||''}" required></div>
                    <div><label class="flbl">BB $</label><input type="number" class="input-field r-bb" value="${data.bbPrice||''}"></div>
                    <div><label class="flbl">HB $</label><input type="number" class="input-field r-hb" value="${data.hbPrice||''}"></div>
                    <div><label class="flbl">FB $</label><input type="number" class="input-field r-fb" value="${data.fbPrice||''}"></div>
                    <div><label class="flbl">AI $</label><input type="number" class="input-field r-ai" value="${data.aiPrice||''}"></div>
                </div>
                <div class="input-grid" style="margin-top:15px;">
                    <select class="input-field r-bed">
                        <option value="Single" ${data.bedType==='Single'?'selected':''}>Single Bed</option>
                        <option value="Double" ${data.bedType==='Double'?'selected':''}>Double Bed</option>
                    </select>
                    <input type="number" class="input-field r-qty" value="${data.quantity||1}" placeholder="Quantity">
                </div>
                <i class="fas fa-times remove-row" onclick="this.parentElement.remove()"></i>`;
            document.getElementById('roomsContainer').appendChild(row);
        }

        function addImageRow(data = {}) {
            const row = document.createElement('div');
            row.className = 'room-row image-entry';
            const iUrl = data.imageUrl ? (data.imageUrl.startsWith('/') ? `${baseUrl}${data.imageUrl}` : data.imageUrl) : null;
            row.innerHTML = `
                <div class="input-grid" style="margin-bottom:15px;">
                    <div style="display:flex; flex-direction:column;">
                        <label class="flbl">Photo</label>
                        ${iUrl ? `<div style="margin-bottom:10px;"><img src="${iUrl}" style="height:60px; border-radius:8px; border:1px solid var(--gold);"><input type="hidden" class="i-url" value="${data.imageUrl}"></div>` : '<input type="hidden" class="i-url" value="">'}
                        <input type="file" class="input-field i-file" accept="image/*">
                    </div>
                    <div>
                        <label class="flbl">Title/Caption</label>
                        <input type="text" class="input-field i-cap" value="${data.caption||''}" placeholder="e.g. Lobby">
                        <div style="margin-top:10px; display:flex; align-items:center; gap:10px;">
                            <label class="amenity-item" style="padding:5px 10px;"><input type="checkbox" class="i-pri" ${data.isPrimary?'checked':''}> <span>Main</span></label>
                            <input type="number" class="input-field i-sort" value="${data.sortOrder||1}" style="width:60px;" title="Sort Order">
                        </div>
                    </div>
                </div>
                <i class="fas fa-trash remove-row" onclick="this.parentElement.remove()"></i>`;
            document.getElementById('imagesContainer').appendChild(row);
        }

        function addCancelRule(f = 0, t = 24, p = 100) {
            const row = document.createElement('div');
            row.className = 'rule-entry';
            row.style = "display:grid; grid-template-columns:1fr 1fr 1fr 40px; gap:10px; align-items:center; background:rgba(255,255,255,0.03); padding:10px; border-radius:8px;";
            row.innerHTML = `
                <div><label class="flbl" style="font-size:9px;">From (h)</label><input type="number" class="input-field r-from" value="${f}"></div>
                <div><label class="flbl" style="font-size:9px;">To (h)</label><input type="number" class="input-field r-to" value="${t}"></div>
                <div><label class="flbl" style="font-size:9px;">Penalty %</label><input type="number" class="input-field r-pct" value="${p}"></div>
                <i class="fas fa-times" style="color:var(--error); cursor:pointer;" onclick="this.parentElement.remove()"></i>`;
            document.getElementById('cancelRulesContainer').appendChild(row);
        }

        function setStrategy(btn, s) {
            document.querySelectorAll('.cancel-opt').forEach(b => b.classList.remove('on'));
            btn.classList.add('on');
            selectedStrategy = s;
            document.getElementById('cancelWindowSection').style.display = (s === 'WindowBased') ? 'block' : 'none';
        }

        function goToStep(step) {
            document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
            document.getElementById(`step${step}`).classList.add('active');
            document.querySelectorAll('.step-dot').forEach((dot, idx) => {
                dot.classList.toggle('active', (idx + 1) === step);
                dot.classList.toggle('completed', (idx + 1) < step);
            });
            currentStep = step;
            document.getElementById('prevBtn').style.display = step > 1 ? 'block' : 'none';
            document.getElementById('nextBtn').style.display = step < 6 ? 'block' : 'none';
            document.getElementById('updateBtn').style.display = step === 6 ? 'block' : 'none';
            window.scrollTo(0, 0);
        }
        function next() { if(currentStep < 6) goToStep(currentStep + 1); }
        function prev() { if(currentStep > 1) goToStep(currentStep - 1); }

        function objectToFormData(obj, formData = new FormData(), parentKey = '') {
            if (obj === null || obj === undefined) return formData;
            if (obj instanceof File) {
                formData.append(parentKey, obj);
            } else if (Array.isArray(obj)) {
                obj.forEach((element, index) => {
                    objectToFormData(element, formData, `${parentKey}[${index}]`);
                });
            } else if (typeof obj === 'object' && !(obj instanceof Date)) {
                Object.keys(obj).forEach(key => {
                    const value = obj[key];
                    const fullKey = parentKey ? `${parentKey}.${key}` : key;
                    objectToFormData(value, formData, fullKey);
                });
            } else {
                formData.append(parentKey, obj);
            }
            return formData;
        }

        async function updateApplication(e) {
            e.preventDefault();
            const btn = document.getElementById('updateBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Updating...';

            const payload = {
                hotelName: document.getElementById('hotelName').value,
                propertyType: document.getElementById('propertyType').value,
                accommodationType: document.getElementById('accommodationType').value,
                starRating: parseInt(document.getElementById('starRating').value),
                description: document.getElementById('description').value,
                governorate: document.getElementById('governorate').value,
                cityArea: document.getElementById('cityArea').value,
                addressDetails: document.getElementById('addressDetails').value,
                addressProofFile: document.getElementById('addressProofFile').files[0] || null,
                amenityIds: [...new Set(Array.from(document.querySelectorAll('input[name="amenity"]:checked')).map(i => parseInt(i.value)))],
                contacts: Array.from(document.querySelectorAll('.contact-entry')).map(r => ({
                    contactType: r.querySelector('.c-type').value,
                    contactValue: r.querySelector('.c-val').value
                })),
                dynamicFields: Array.from(document.querySelectorAll('.dyn-field-entry')).map(r => {
                    const val = r.querySelector('.d-val').value;
                    return val ? { fieldDefinitionId: parseInt(r.dataset.defId), value: val } : null;
                }).filter(x => x !== null),
                policy: {
                    serviceChargePct: parseFloat(document.getElementById('serviceChargePct').value) || 0,
                    includeVat: document.getElementById('includeVat').checked,
                    includeServiceCharge: document.getElementById('includeServiceCharge').checked,
                    includeCityTax: document.getElementById('includeCityTax').checked,
                    cancellationStrategy: selectedStrategy,
                    cancellationRules: selectedStrategy === 'WindowBased' ? Array.from(document.querySelectorAll('.rule-entry')).map(r => ({
                        fromHoursBeforeCheckIn: parseInt(r.querySelector('.r-from').value),
                        toHoursBeforeCheckIn: parseInt(r.querySelector('.r-to').value),
                        penaltyPct: parseFloat(r.querySelector('.r-pct').value)
                    })) : []
                },
                initialRooms: Array.from(document.querySelectorAll('.room-entry')).map(r => ({
                    name: r.querySelector('.r-name').value,
                    occupancy: parseInt(r.querySelector('.r-occ').value),
                    roPrice: parseFloat(r.querySelector('.r-ro').value),
                    bbPrice: parseFloat(r.querySelector('.r-bb').value) || null,
                    hbPrice: parseFloat(r.querySelector('.r-hb').value) || null,
                    fbPrice: parseFloat(r.querySelector('.r-fb').value) || null,
                    aiPrice: parseFloat(r.querySelector('.r-ai').value) || null,
                    bedType: r.querySelector('.r-bed').value,
                    quantity: parseInt(r.querySelector('.r-qty').value)
                })),
                images: Array.from(document.querySelectorAll('.image-entry')).map(r => ({
                    imageFile: r.querySelector('.i-file').files[0] || null,
                    imageUrl: r.querySelector('.i-url').value,
                    caption: r.querySelector('.i-cap').value,
                    isPrimary: r.querySelector('.i-pri').checked,
                    sortOrder: parseInt(r.querySelector('.i-sort').value) || 1
                })),
                documents: Array.from(document.querySelectorAll('.doc-entry')).map(r => ({
                    documentTypeId: parseInt(r.dataset.typeId),
                    fileUrl: r.querySelector('.d-url').value,
                    file: r.querySelector('.d-file').files[0] || null
                }))
            };

            const formData = objectToFormData(payload);
            const res = await API.post('/Hotels/apply', formData);
            if(res.success) {
                alert("Application updated successfully!");
                location.href = 'apply-hotel.html';
            } else {
                alert(res.message || "Update failed.");
                btn.disabled = false; btn.innerText = "Update Application";
            }
        }

        init();
    </script>
</body>
</html>
