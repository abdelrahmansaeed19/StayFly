<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile App Endpoint Documentation</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --gold: #d4a853;
            --border: rgba(255, 255, 255, 0.1);
            --method-get: #3b82f6;
            --method-post: #10b981;
            --method-put: #f59e0b;
            --method-delete: #ef4444;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 380px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
            text-align: center;
        }

        .sidebar-header h1 {
            margin: 0;
            font-family: 'Cormorant Garamond', serif;
            color: var(--gold);
            font-size: 1.5rem;
        }

        .category-title {
            padding: 20px 24px 8px;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: 700;
        }

        .endpoint-link {
            padding: 12px 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .endpoint-link:hover, .endpoint-link.active {
            background: rgba(255, 255, 255, 0.05);
            border-left-color: var(--gold);
        }

        .method-badge {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 4px;
            min-width: 45px;
            text-align: center;
            text-transform: uppercase;
        }

        .method-GET { background: rgba(59, 130, 246, 0.2); color: var(--method-get); }
        .method-POST { background: rgba(16, 185, 129, 0.2); color: var(--method-post); }
        .method-PUT { background: rgba(245, 158, 11, 0.2); color: var(--method-put); }
        .method-DELETE { background: rgba(239, 68, 68, 0.2); color: var(--method-delete); }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            position: relative;
        }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease-up;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .url-box {
            background: #0f172a;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid var(--border);
            font-family: monospace;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            word-break: break-all;
        }

        h2 { font-family: 'Cormorant Garamond', serif; color: var(--gold); font-size: 2rem; margin-top: 0;}
        h3 { font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-top: 30px; color: #cbd5e1;}

        pre {
            background: #0f172a;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border);
            color: #a5b4fc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.95rem;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--gold);
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 100px;
            color: var(--text-muted);
        }
        
        /* Highlight specific keys */
        .hl-req { color: #fca5a5; font-weight: 600; }
        .hl-res { color: #86efac; font-weight: 600; }
    </style>
</head>

                        title: "Manage Doc Types", method: "POST", url: "/api/AdminManagement/document-types",
                        desc: "Create a new document type requirement. (To update, use PUT and /[id]).",
                        requestParams: null,
                        requestBody: "{\n  \"id\": 0,\n  \"name\": \"ID Card\",\n  \"keyName\": \"id_card\",\n  \"isRequired\": true,\n  \"isActive\": true\n}",
                        response: "{\n  \"success\": true\n}"
                    },
                    {
                        title: "Delete Doc Type", method: "DELETE", url: "/api/AdminManagement/document-types/{id}",
                        desc: "Remove a document type.",
                        requestParams: [{ name: "id", type: "Path", desc: "Doc Type ID" }],
                        requestBody: null,
                        response: "{\n  \"success\": true\n}"
                    },
                    {
                        title: "Manage Dynamic Fields", method: "POST", url: "/api/AdminManagement/field-definitions",
                        desc: "Create a new dynamic field. FieldType: (0=Text, 1=TextArea, 2=Number, 3=Date, 4=File)",
                        requestParams: null,
                        requestBody: "{\n  \"id\": 0,\n  \"displayName\": \"Label Name\",\n  \"keyName\": \"system_key\",\n  \"fieldType\": 0,\n  \"isRequired\": true,\n  \"isActive\": true\n}",
                        response: "{\n  \"success\": true\n}"
                    },
                    {
                        title: "Delete Field", method: "DELETE", url: "/api/AdminManagement/field-definitions/{id}",
                        desc: "Remove a dynamic field definition.",
                        requestParams: [{ name: "id", type: "Path", desc: "Field ID" }],
                        requestBody: null,
                        response: "{\n  \"success\": true\n}"
                    }
                ]
            }
        ];

        // --- Render Sidebar ---
        const sidebar = document.getElementById('sidebar');
        let html = '';
        
        apiData.forEach((cat, catIdx) => {
            html += `<div class="category-title">${cat.category}</div>`;
            cat.endpoints.forEach((ep, epIdx) => {
                html += `
                    <div class="endpoint-link" onclick="showDetails(${catIdx}, ${epIdx}, this)">
                        <span class="method-badge method-${ep.method}">${ep.method}</span>
                        <span style="font-size: 0.95rem;">${ep.title}</span>
                    </div>
                `;
            });
        });
        sidebar.innerHTML += html;

        // --- Render Content ---
        function showDetails(catIdx, epIdx, el) {
            // Update Active State
            document.querySelectorAll('.endpoint-link').forEach(link => link.classList.remove('active'));
            if(el) el.classList.add('active');

            const ep = apiData[catIdx].endpoints[epIdx];
            const content = document.getElementById('mainContent');

            let paramsHtml = '';
            if (ep.requestParams && ep.requestParams.length > 0) {
                paramsHtml = `
                    <h3><span style="color:#93c5fd; font-weight:600;"><i class="fas fa-filter"></i> Request Parameters</span> (Query/Path)</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Type / Location</th>
                                <th>Description</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${ep.requestParams.map(p => `
                                <tr>
                                    <td style="color:var(--text-main);"><code>${p.name}</code></td>
                                    <td style="color:var(--text-muted);">${p.type}</td>
                                    <td>${p.desc}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }

            let bodyHtml = '';
            if (ep.requestBody) {
                bodyHtml = `
                    <h3><span class="hl-req"><i class="fas fa-file-export"></i> Request Body</span> (Data Sent to Backend)</h3>
                    <pre><code>${ep.requestBody}</code></pre>
                `;
            } else {
                bodyHtml = `
                    <h3><span class="hl-req"><i class="fas fa-file-export"></i> Request Body</span> (Data Sent to Backend)</h3>
                    <pre><code style="color: #64748b; font-style: italic;">// No JSON body required for this ${ep.method} request.\n// Please use the query/path parameters listed above.</code></pre>
                `;
            }

            content.innerHTML = `
                <div class="card">
                    <h2>${ep.title.split('. ').pop()}</h2>
                    <p style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.5;">${ep.desc}</p>
                    
                    <div class="url-box">
                        <span class="method-badge method-${ep.method}" style="font-size: 0.9rem; padding: 6px 12px; margin-right: 10px;">${ep.method}</span>
                        <span style="color: #a5b4fc; font-weight: 600;">https://travi-hkc4hhejdjcxech3.westeurope-01.azurewebsites.net</span>${ep.url}
                    </div>

                    ${paramsHtml}
                    ${bodyHtml}

                    <h3><span class="hl-res"><i class="fas fa-file-import"></i> Response</span> (Data Accepted from Backend)</h3>
                    <pre><code>${ep.response}</code></pre>
                </div>
            `;
        }
    </script>
</body>
</html>
